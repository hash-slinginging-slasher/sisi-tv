<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SISI-TV{% endblock %}</title>
    <link rel="icon" href="/static/boy-sisi.png">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#051424",
                        "surface-dim": "#051424",
                        "surface-bright": "#2c3a4c",
                        "surface-container-lowest": "#010f1f",
                        "surface-container-low": "#0d1c2d",
                        "surface-container": "#122131",
                        "surface-container-high": "#1c2b3c",
                        "surface-container-highest": "#273647",
                        "on-surface": "#d4e4fa",
                        "on-surface-variant": "#bac9cc",
                        "outline": "#849396",
                        "outline-variant": "#3b494c",
                        "primary": "#c3f5ff",
                        "on-primary": "#00363d",
                        "primary-container": "#00e5ff",
                        "on-primary-container": "#00626e",
                        "primary-fixed-dim": "#00daf3",
                        "secondary": "#ffb4aa",
                        "on-secondary": "#690003",
                        "secondary-container": "#c5020b",
                        "on-secondary-container": "#ffd2cc",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                    },
                    fontFamily: {
                        "body": ["Inter", "system-ui", "sans-serif"],
                        "mono": ["JetBrains Mono", "ui-monospace", "monospace"],
                    },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .font-mono, code { font-family: 'JetBrains Mono', ui-monospace, monospace; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .live-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
        .scanline { position: absolute; left: 0; right: 0; top: 0; height: 2px; background: rgba(0,218,243,0.10); pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0d1c2d; }
        ::-webkit-scrollbar-thumb { background: #3b494c; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #00daf3; }
        .nav-label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex">
    <aside class="h-screen w-60 fixed left-0 top-0 flex flex-col py-6 px-4 border-r border-outline-variant bg-surface-container-low z-50">
        <a href="/" class="flex items-center gap-3 mb-8 px-2">
            <div class="w-10 h-10 rounded-lg bg-primary-container/20 border border-primary-fixed-dim/30 overflow-hidden flex items-center justify-center">
                <img src="/static/boy-sisi.png" alt="Boy Sisi mascot" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-mono font-bold text-lg text-primary tracking-tight leading-none">SISI-TV</h1>
                <p class="nav-label text-on-surface-variant mt-1">Vigilant Intelligence</p>
            </div>
        </a>
        <nav class="space-y-1 flex-grow">
            {% set active = active_nav | default('') %}
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'dashboard' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="/grid" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'matrix' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">grid_view</span>
                <span class="nav-label">Live Matrix</span>
            </a>
            <a href="/events" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'events' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">history</span>
                <span class="nav-label">Event History</span>
            </a>
            <a href="/settings" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'settings' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">settings</span>
                <span class="nav-label">System Settings</span>
            </a>
        </nav>
        <div class="mt-auto px-2">
            <div class="p-3 bg-surface-container-high rounded-lg border border-outline-variant flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-secondary-container/30 border border-secondary/30 flex items-center justify-center">
                    <span class="material-symbols-outlined text-secondary text-base">security</span>
                </div>
                <div>
                    <p class="font-mono text-xs text-on-surface tracking-wider">SHIELD ACTIVE</p>
                    <p class="text-[10px] text-primary font-mono">v0.1.0</p>
                </div>
            </div>
        </div>
    </aside>
    <main class="ml-60 flex-grow flex flex-col min-h-screen">
        <header class="flex justify-between items-center h-14 px-6 border-b border-outline-variant bg-surface sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <span class="font-mono text-lg text-primary tracking-tight">{% block heading %}SISI-TV{% endblock %}</span>
                <div class="h-4 w-px bg-outline-variant"></div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-primary-fixed-dim shadow-[0_0_8px_#00daf3]"></span>
                    <span class="nav-label text-primary">System Online</span>
                </div>
            </div>
            <div class="flex items-center gap-4 text-on-surface-variant">
                <span class="material-symbols-outlined text-base">wifi</span>
                <span class="material-symbols-outlined text-base">database</span>
                <div class="w-8 h-8 rounded-full border border-primary-fixed-dim/40 p-0.5 overflow-hidden">
                    <img src="/static/boy-sisi.png" alt="Operator avatar" class="w-full h-full rounded-full object-cover">
                </div>
            </div>
        </header>
        <div class="flex-grow p-6 overflow-y-auto">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
