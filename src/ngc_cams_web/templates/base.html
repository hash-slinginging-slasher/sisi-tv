<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SISI-TV{% endblock %}</title>
    <link rel="icon" href="/static/boy-sisi.png">
    <!-- All assets are vendored under /static/ via scripts/vendor_static.py so
         the kiosk display works on a LAN with no internet. Inter / JetBrains
         Mono are intentionally NOT vendored -- the font-family rules below
         fall back to system-ui / ui-monospace (Segoe UI / Consolas on Windows)
         which look near-identical and saves ~150KB. -->
    <script src="/static/tailwind.js"></script>
    <script src="/static/htmx.min.js" defer></script>
    <link href="/static/fonts/material-symbols.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#051424",
                        "surface-dim": "#051424",
                        "surface-bright": "#2c3a4c",
                        "surface-container-lowest": "#010f1f",
                        "surface-container-low": "#0d1c2d",
                        "surface-container": "#122131",
                        "surface-container-high": "#1c2b3c",
                        "surface-container-highest": "#273647",
                        "on-surface": "#d4e4fa",
                        "on-surface-variant": "#bac9cc",
                        "outline": "#849396",
                        "outline-variant": "#3b494c",
                        "primary": "#c3f5ff",
                        "on-primary": "#00363d",
                        "primary-container": "#00e5ff",
                        "on-primary-container": "#00626e",
                        "primary-fixed-dim": "#00daf3",
                        "secondary": "#ffb4aa",
                        "on-secondary": "#690003",
                        "secondary-container": "#c5020b",
                        "on-secondary-container": "#ffd2cc",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                    },
                    fontFamily: {
                        "body": ["Inter", "system-ui", "sans-serif"],
                        "mono": ["JetBrains Mono", "ui-monospace", "monospace"],
                    },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .font-mono, code { font-family: 'JetBrains Mono', ui-monospace, monospace; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .live-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
        /* Generic cyan scanline on every tile. Used to be a flat 4s animation
           so every tile's line crossed the same Y at the same moment -- this
           was the synchronized "scrolling down" the user noticed, independent
           of which atmosphere filter is active. Now keyed off --feed-seed
           (set per-tile from fib(camera_id+2)) so each tile scans at its
           own rate AND starts at its own phase. */
        .scanline {
            position: absolute; left: 0; right: 0; top: 0; height: 2px;
            background: rgba(0,218,243,0.10); pointer-events: none;
            animation: scan calc(2.5s + var(--feed-seed, 0) * 0.7s) linear infinite;
            animation-delay: calc(var(--feed-seed, 0) * -0.9s);
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0d1c2d; }
        ::-webkit-scrollbar-thumb { background: #3b494c; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #00daf3; }
        .nav-label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

        /* === Atmospheric Camera Filters (design 05) === */
        /* Per-tile desync: each filter-container exposes a --feed-seed custom
           property (set inline from the camera id). Negative animation-delay
           values seeded from it stagger flickers/scans/noise/tracking lines
           so cameras don't move in lockstep. */
        .filter-container { position: relative; overflow: hidden; --feed-seed: 0; }
        .filter-container .fnaf-overlay,
        .filter-container .static-overlay,
        .filter-container .vhs-overlay,
        .filter-container .mgs-overlay,
        .filter-container .mgs-ui,
        .filter-container .tracking-line,
        .filter-container .low-batt,
        .filter-container .rec-text { display: none; }

        /* === FNAF === */
        /* Per-tile duration drift keeps even adjacent cameras from re-syncing
           over time. Prime-ish multipliers in the delays push each tile to a
           visibly different phase from frame one. */
        .fnaf-filter img { filter: sepia(0.5) hue-rotate(80deg) brightness(0.7) contrast(1.2); }
        .fnaf-filter .fnaf-overlay {
            display: block; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(0,20,0,0.8) 100%);
            animation: feed-flicker calc(2s + var(--feed-seed) * 0.37s) infinite;
            animation-delay: calc(var(--feed-seed) * -1.7s);
            z-index: 10;
        }
        .fnaf-filter::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0, rgba(0,255,0,0.03) 1px, transparent 2px, transparent 4px);
            background-position: 0 calc(var(--feed-seed) * 1px);
        }
        @keyframes feed-flicker {
            0%,32%,34%,71%,73%,100% { opacity: 0.99; }
            33%,72%,86% { opacity: 0.4; }
            85%,87% { opacity: 0.2; }
        }
        @keyframes low-batt-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        .fnaf-filter .low-batt, .mgs-filter .low-batt {
            /* Sits in the top-right; LIVE/REC badges live top-left so no
               overlap there, but keep some breathing room from the edge. */
            display: block; color: #0f0; font-family: 'JetBrains Mono', monospace;
            font-size: 10px; position: absolute; top: 10px; right: 10px; z-index: 35;
            animation: low-batt-blink calc(0.9s + var(--feed-seed) * 0.13s) steps(1) infinite;
            animation-delay: calc(var(--feed-seed) * -0.41s);
        }
        /* FNAF degraded: heavier vignette + occasional camera-out blackout.
           Per-tile blackout duration so two degraded cameras never go dark
           together. */
        .fnaf-filter.variant-degraded img {
            filter: sepia(0.7) hue-rotate(80deg) brightness(0.35) contrast(1.5);
        }
        .fnaf-filter.variant-degraded .fnaf-overlay {
            animation:
                feed-flicker calc(1.5s + var(--feed-seed) * 0.29s) infinite,
                fnaf-blackout calc(7s + var(--feed-seed) * 1.3s) infinite;
            animation-delay:
                calc(var(--feed-seed) * -2.1s),
                calc(var(--feed-seed) * -3.7s);
        }
        @keyframes fnaf-blackout {
            0%,84%,100% { background: radial-gradient(circle, transparent 40%, rgba(0,20,0,0.8) 100%); }
            85%,93% { background: rgba(0,0,0,0.96); }
            94%,99% { background: radial-gradient(circle, rgba(20,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); }
        }

        /* === Static === */
        /* "Only one monitor shakes at a time": each tile runs a 15s cycle
           where 92% of the time the image is still and ~8% is a brief shake
           burst. Per-tile delay (-1.7s * fib seed) scatters which tile is
           currently in its burst window. With fib spreading, two cameras
           rarely overlap their shake windows. */
        .static-filter img {
            filter: grayscale(1) contrast(1.8) brightness(0.9);
            animation: feed-jitter-burst 15s linear infinite;
            animation-delay: calc(var(--feed-seed) * -1.7s);
        }
        @keyframes feed-jitter-burst {
            0%, 91% { transform: translateX(0); }
            92% { transform: translateX(2px); }
            93% { transform: translateX(-3px); }
            94% { transform: translateX(2px) translateY(-1px); }
            95% { transform: translateX(-2px) translateY(1px); }
            96% { transform: translateX(3px); }
            97% { transform: translateX(-1px); }
            98%, 100% { transform: translateX(0); }
        }
        .static-filter .static-overlay {
            display: block; position: absolute; inset: -20%; pointer-events: none;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)"/%3E%3C/svg%3E');
            opacity: 0.15; z-index: 25; mix-blend-mode: overlay;
            animation: feed-noise 0.1s steps(2) infinite;
            animation-delay: calc(var(--feed-seed) * -0.05s);
        }
        @keyframes feed-noise {
            0%,100% { transform: translate(0,0); }
            25% { transform: translate(-2%,-2%); }
            50% { transform: translate(2%,2%); }
            75% { transform: translate(-1%,1%); }
        }
        /* Static degraded: dead channel + always-shaking (broken camera) */
        .static-filter.variant-degraded img {
            filter: grayscale(1) contrast(3) brightness(0.5);
            animation: feed-jitter-constant 0.18s infinite;
        }
        @keyframes feed-jitter-constant {
            0% { transform: translateX(0); } 25% { transform: translateX(2px); }
            50% { transform: translateX(-2px); } 75% { transform: translateX(1px); }
        }
        .static-filter.variant-degraded .static-overlay { opacity: 0.55; }

        /* === VHS === */
        .vhs-filter img { filter: sepia(0.3) contrast(1.1) brightness(0.9) saturate(1.2); }
        .vhs-filter .vhs-overlay {
            display: block; position: absolute; inset: 0; pointer-events: none; z-index: 20;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.01), rgba(0,255,0,0.05));
            background-size: 100% 3px, 3px 100%;
        }
        .vhs-filter .tracking-line {
            display: block; position: absolute; width: 100%; height: 4px;
            background: rgba(255,255,255,0.1); filter: blur(1px); z-index: 21;
            /* Each tile gets a VERY different scan speed. Fib seeds 2/3/5/8/13
               give durations of 4s / 6s / 10s / 16s / 26s -- so even if two
               cameras happened to overlap on one frame, they're scanning at
               wildly different rates and will never sync visually. Delay
               picks an arbitrary starting phase too. */
            animation: feed-tracking calc(var(--feed-seed) * 2s) linear infinite;
            animation-delay: calc(var(--feed-seed) * -1.1s);
        }
        @keyframes feed-tracking {
            0% { transform: translateY(-100%); } 100% { transform: translateY(100%); }
        }
        .vhs-filter .rec-text, .mgs-filter .rec-text {
            /* Moved down so it doesn't crash into the LIVE/REC badges which
               sit at top:8 / left:8..67. */
            display: block; color: #f00; font-family: 'Courier New', monospace; font-weight: bold;
            position: absolute; top: 30px; left: 10px; z-index: 22; text-shadow: 2px 2px #000;
        }
        /* VHS degraded: heavy red-shift + faster tracking + thicker bands */
        .vhs-filter.variant-degraded img {
            filter: sepia(0.6) contrast(1.3) brightness(0.7) saturate(2) hue-rotate(-10deg);
        }
        .vhs-filter.variant-degraded .vhs-overlay {
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.3) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.15), rgba(0,255,0,0.02), rgba(0,255,0,0.12));
            background-size: 100% 5px, 5px 100%;
        }
        .vhs-filter.variant-degraded .tracking-line {
            /* Degraded VHS: still spread by seed but faster overall -- 2..8s */
            animation: feed-tracking calc(var(--feed-seed) * 0.9s) linear infinite;
            animation-delay: calc(var(--feed-seed) * -0.7s);
            height: 8px;
            background: rgba(255,255,255,0.2);
        }

        /* === Metal Gear Solid === */
        .mgs-filter img {
            filter: sepia(1) hue-rotate(60deg) saturate(2) brightness(0.8) contrast(1.1);
            image-rendering: pixelated;
        }
        .mgs-filter .mgs-overlay {
            display: block; position: absolute; inset: 0; pointer-events: none; z-index: 20;
            background: linear-gradient(rgba(0,255,100,0.1) 50%, transparent 50%);
            background-size: 100% 4px;
        }
        .mgs-filter .mgs-ui {
            display: flex; flex-direction: column; justify-content: space-between;
            position: absolute; inset: 0;
            /* Top padding pushed past the LIVE/REC badge row (~24px tall +
               8px from container edge) so MGS UI text doesn't overlap. */
            padding: 32px 10px 10px 10px; z-index: 30; pointer-events: none;
            font-family: 'JetBrains Mono', monospace; color: #00ff66;
            text-transform: uppercase; font-weight: 700; font-size: 9px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
        }
        .mgs-filter .soliton-radar {
            display: block; position: absolute; right: 10px; bottom: 10px;
            width: 50px; height: 50px; border: 1px solid #00ff66;
            background: rgba(0,255,100,0.05); border-radius: 2px;
            /* Per-tile scan period: 1.2..6s with fib seeds 2..13 */
            animation: mgs-scan calc(0.8s + var(--feed-seed) * 0.4s) infinite;
            animation-delay: calc(var(--feed-seed) * -0.5s);
        }
        @keyframes mgs-scan { 0%,100% { opacity: 0.2; } 50% { opacity: 0.6; } }
        /* MGS degraded: enemy-sighted red pulse + connection-lost overlay */
        .mgs-filter.variant-degraded img {
            filter: sepia(1) hue-rotate(-20deg) saturate(2.5) brightness(0.6) contrast(1.2);
        }
        .mgs-filter.variant-degraded::after {
            content: 'CONNECTION LOST'; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #ff3030; font-family: 'JetBrains Mono', monospace; font-weight: 700;
            font-size: 14px; letter-spacing: 0.2em; text-shadow: 2px 2px 0 rgba(0,0,0,0.9);
            z-index: 28; pointer-events: none;
            animation: mgs-enemy-pulse 1.4s infinite;
            animation-delay: calc(var(--feed-seed) * -0.37s);
        }
        @keyframes mgs-enemy-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* === Live Matrix fullscreen mode === */
        /* Toggled on <body> by the Fullscreen button in /grid. Strips sidebar,
           top bar, and surrounding chrome so the feeds fill every pixel of
           the viewport. The actual browser fullscreen (F11-style) is also
           requested via the JS so the user's taskbar gets out of the way. */
        body.grid-fullscreen aside,
        body.grid-fullscreen header,
        body.grid-fullscreen .grid-page-chrome { display: none !important; }
        body.grid-fullscreen main { margin-left: 0 !important; }
        body.grid-fullscreen main > div { padding: 0 !important; overflow: hidden !important; }
        body.grid-fullscreen #grid-container {
            height: 100vh !important;
            gap: 0 !important;
        }
        body.grid-fullscreen #grid-container .grid-tile {
            border-radius: 0 !important;
            border: none !important;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex">
    <aside class="h-screen w-60 fixed left-0 top-0 flex flex-col py-6 px-4 border-r border-outline-variant bg-surface-container-low z-50">
        <a href="/" class="flex items-center gap-3 mb-8 px-2">
            <div class="w-10 h-10 rounded-lg bg-primary-container/20 border border-primary-fixed-dim/30 overflow-hidden flex items-center justify-center">
                <img src="/static/boy-sisi.png" alt="Boy Sisi mascot" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="font-mono font-bold text-lg text-primary tracking-tight leading-none">SISI-TV</h1>
                <p class="nav-label text-on-surface-variant mt-1">Vigilant Intelligence</p>
            </div>
        </a>
        <nav class="space-y-1 flex-grow">
            {% set active = active_nav | default('') %}
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'dashboard' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="/grid" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'matrix' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">grid_view</span>
                <span class="nav-label">Live Matrix</span>
            </a>
            <a href="/events" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'events' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">history</span>
                <span class="nav-label">Event History</span>
            </a>
            <a href="/settings" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active == 'settings' %}text-primary border-r-2 border-primary bg-surface-container-high{% else %}text-on-surface-variant hover:text-primary hover:bg-surface-container-highest{% endif %}">
                <span class="material-symbols-outlined">settings</span>
                <span class="nav-label">System Settings</span>
            </a>
        </nav>
        <div class="mt-auto px-2">
            <div class="p-3 bg-surface-container-high rounded-lg border border-outline-variant flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-secondary-container/30 border border-secondary/30 flex items-center justify-center">
                    <span class="material-symbols-outlined text-secondary text-base">security</span>
                </div>
                <div>
                    <p class="font-mono text-xs text-on-surface tracking-wider">SHIELD ACTIVE</p>
                    <p class="text-[10px] text-primary font-mono">v0.1.0</p>
                </div>
            </div>
        </div>
    </aside>
    <main class="ml-60 flex-grow flex flex-col min-h-screen">
        <header class="flex justify-between items-center h-14 px-6 border-b border-outline-variant bg-surface sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <span class="font-mono text-lg text-primary tracking-tight">{% block heading %}SISI-TV{% endblock %}</span>
                <div class="h-4 w-px bg-outline-variant"></div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-primary-fixed-dim shadow-[0_0_8px_#00daf3]"></span>
                    <span class="nav-label text-primary">System Online</span>
                </div>
            </div>
            <div class="flex items-center gap-4 text-on-surface-variant">
                <span class="material-symbols-outlined text-base">wifi</span>
                <span class="material-symbols-outlined text-base">database</span>
                <div class="w-8 h-8 rounded-full border border-primary-fixed-dim/40 p-0.5 overflow-hidden">
                    <img src="/static/boy-sisi.png" alt="Operator avatar" class="w-full h-full rounded-full object-cover">
                </div>
            </div>
        </header>
        <div class="flex-grow p-6 overflow-y-auto">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
